<div class="window-controls">
  <button
    type="button"
    class="window-button"
    data-action="minimize"
    aria-label="Minimize window"
  >
    MIN
  </button>
  <button
    type="button"
    class="window-button"
    data-action="maximize"
    aria-label="Maximize window"
  >
    MAX
  </button>
  <button
    type="button"
    class="window-button close"
    data-action="close"
    aria-label="Close window"
  >
    CLOSE
  </button>
</div>
