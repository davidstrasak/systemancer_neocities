{{ define "main" }}
<main class="viewport-window">
  <div class="title-bar">
    <div class="title-bar-text">{{ .Title }}</div>
    {{ partial "window-controls" . }}
  </div>

  <article class="window-body">
    <div class="cyber-text">
      <time>{{ .Date.Format "2006-01-02" }}</time>
    </div>
    <div class="content-body">{{ .Content }}</div>
  </article>
</main>
{{ end }}
